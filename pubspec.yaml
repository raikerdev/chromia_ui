name: chromia_ui
description: "A modern, dynamic Flutter design system with multi-brand theming, 40+ components, and Material 3 integration."
version: 0.1.0
homepage: https://github.com/raikerdev/chromia_ui
repository: https://github.com/raikerdev/chromia_ui
issue_tracker: https://github.com/raikerdev/chromia_ui/issues

topics:
  - ui
  - design-system
  - theming
  - material
  - components

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - lib/fonts/PlusJakartaSans-Regular.ttf
    - lib/fonts/PlusJakartaSans-Medium.ttf
    - lib/fonts/PlusJakartaSans-SemiBold.ttf

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: lib/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: lib/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: lib/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
